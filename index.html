    <script>
        let isSoundOn = true;
        let audioCtx = null;

        // 延遲、安全的音效初始化函數，避免頁面載入時被 iOS/Android 阻擋報錯
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!isSoundOn) return;
            try {
                initAudio();
                const now = audioCtx.currentTime;

                if (type === 'tick') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(1000, now);
                    gain.gain.setValueAtTime(0.04, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } 
                else if (type === 'flip') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                } 
                else if (type === 'correct') {
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    notes.forEach((freq, index) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + index * 0.08);
                        gain.gain.setValueAtTime(0.1, now + index * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.08 + 0.25);
                        osc.start(now + index * 0.08);
                        osc.stop(now + index * 0.08 + 0.25);
                    });
                } 
                else if (type === 'incorrect') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(260, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.45);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                    osc.start(now);
                    osc.stop(now + 0.45);
                } 
                else if (type === 'magic') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(2400, now + 0.4);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                }
            } catch (e) {
                console.warn("音效撥放受限：", e);
            }
        }

        function updateTeamsDashboard() {
            const dashboard = document.getElementById('teams-dashboard');
            dashboard.innerHTML = '';
            
            teams.forEach((team, idx) => {
                const isActive = idx === currentTeamIndex;

        function startNewGame() {
            const teamCount = parseInt(settingTeamCount.value);
            teams = [];
            
            // 解析結束條件
            const endCond = settingEndCondition.value;
            roundsPerTeam = 0;
            targetScore = 0;
            if (endCond.startsWith('round-')) {
                roundsPerTeam = parseInt(endCond.split('-')[1]);
            } else if (endCond.startsWith('score-')) {
                targetScore = parseInt(endCond.split('-')[1]);
            }
            
            if (teamCount === 1) {
                teams.push({
                    id: 0,
                    name: "挑戰者",
                    score: 0,
                    streak: 0
                });
            } else {
                const inputs = document.querySelectorAll('.team-name-input');
                inputs.forEach((input, idx) => {
                    teams.push({
                        id: idx,
                        name: input.value.trim() || `第 ${idx + 1} 隊`,
                        score: 0,
                        streak: 0
                    });
                });
            }
            currentTeamIndex = 0;
            currentRound = 1;
            roundDisplay.textContent = '1';
            
            // 顯示或隱藏結束競賽按鈕
            if (teamCount > 1) {
                btnEndGame.classList.remove('hidden');
            } else {
                btnEndGame.classList.add('hidden');
            }
            
            updateTeamsDashboard();
            startRound();
        }

        function startRound() {
            // 清除之前的計時器
            clearInterval(timerInterval);
            guessedWrongIndices = [];
            
            // 確保每關開始時，分數看板會更新當前答題隊伍的高亮狀態
            updateTeamsDashboard();
            
            // 讀取設定值
            const cardCount = parseInt(settingCardCount.value);
            const memTime = parseFloat(settingMemTime.value);
            
            // 洗牌並從資料庫隨機抽取 N 張卡片
            const shuffledDb = [...cardsDatabase].sort(() => Math.random() - 0.5);
            roundCards = shuffledDb.slice(0, cardCount);
            
            // 隨機選中一張作為被修改的卡片
            changedIndex = Math.floor(Math.random() * cardCount);
            
            // 渲染卡片
            renderCards();
            
            // 設定記憶倒數
            gameState = 'MEMORIZE';
            maxTime = memTime;
            timeLeft = memTime;
            updateTimerBar();
            
            const currentTeam = teams[currentTeamIndex];
            if (teams.length > 1) {
                phaseBanner.textContent = `【${currentTeam.name} 回合】請在 ${memTime} 秒內記住這 ${cardCount} 張卡片的圖案！`;
            } else {
                phaseBanner.textContent = `記憶階段：請在 ${memTime} 秒內記住這 ${cardCount} 張卡片的圖案！`;
            }
            phaseBanner.className = "absolute top-4 sm:top-6 bg-white border border-[#7fa8b3] text-[#2c2c2c] font-black px-6 py-2.5 rounded-full shadow-md text-sm sm:text-base tracking-widest uppercase transition-all duration-300 transform scale-100 z-10 text-center";
            
            playSound('magic');
            
            // 啟動倒數計時
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    clearInterval(timerInterval);
                    enterHidePhase();
                } else {
                    // 倒數小於 2 秒時伴隨 tick 音效
                    if (timeLeft <= 2.0 && Math.round(timeLeft * 10) % 10 === 0) {
                        playSound('tick');
                    }
                }
                updateTimerBar();
            }, 100);
        }

        function getCardGraphic(card, side) {
            if (card.imageA && card.imageB) {
                const imgSrc = side === 'A' ? card.imageA : card.imageB;
                return `<img src="${imgSrc}" class="w-full h-full object-contain rounded-lg select-none pointer-events-none" alt="${card.name}">`;
            } else if (typeof card.drawSVG === 'function') {
                return card.drawSVG(side);
            }
            return '';
        }

        function renderCards() {
            cardsContainer.innerHTML = '';
            const cardCount = roundCards.length;
            
            // 根據卡片數量動態調整大小，確保卡片始終能在一行之內完美呈現且尺寸最大化
            let sizeClasses = "w-36 h-50 sm:w-44 sm:h-60 md:w-48 md:h-64";
            if (cardCount === 5) {
                sizeClasses = "w-32 h-44 sm:w-36 sm:h-52 md:w-44 md:h-60";
            } else if (cardCount === 6) {
                sizeClasses = "w-28 h-40 sm:w-32 sm:h-44 md:w-36 md:h-50";
            } else if (cardCount > 6) {
                sizeClasses = "w-20 h-28 sm:w-24 sm:h-34 md:w-26 md:h-38";
            }
            
            roundCards.forEach((card, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = `perspective-1000 relative select-none ${sizeClasses} cursor-pointer group`;
                wrapper.setAttribute('data-index', idx);
                
                // 鍵盤提示小圈圈
                const keyLabel = idx < 9 
                    ? `<div class="absolute -top-2 -left-2 bg-stone-50 border border-stone-200 text-stone-500 font-mono text-xs w-5 h-5 rounded-full flex items-center justify-center z-30 shadow-sm group-hover:scale-110 transition-transform">${idx + 1}</div>` 
                    : '';
                
                wrapper.innerHTML = `
                    ${keyLabel}
                    <div class="card-inner w-full h-full preserve-3d relative rounded-2xl shadow-sm transition-all duration-500">
                        <!-- 正面：圖案 -->
                        <div class="card-front absolute inset-0 w-full h-full backface-hidden bg-white rounded-2xl border-4 border-stone-100 p-1 flex flex-col items-center justify-center shadow-sm relative overflow-hidden">
                            <div class="w-full h-full flex items-center justify-center overflow-hidden pb-3.5">
                                ${getCardGraphic(card, 'A')}
                            </div>
                            <div class="absolute bottom-0.5 left-0 right-0 text-[9px] text-stone-400 font-bold tracking-wider select-none text-center bg-white/80 backdrop-blur-xs py-0.5 border-t border-stone-100/50">${card.name}</div>
                        </div>
                        <!-- 背面：和風和紙格紋 -->
                        <div class="card-back absolute inset-0 w-full h-full backface-hidden rotate-y-180 rounded-2xl">
                            ${getCardBackSVG()}
                        </div>
                    </div>
                `;
                
                // 點擊事件
                wrapper.addEventListener('click', () => {
                    if (gameState === 'REVEAL' && !guessedWrongIndices.includes(idx)) {
                        selectCard(idx);
                    }
                });
                
                cardsContainer.appendChild(wrapper);
            });
        }

        function enterHidePhase() {
            gameState = 'HIDE';
            phaseBanner.textContent = `悄悄修改中... 請聚精會神！`;
            phaseBanner.className = "absolute top-4 sm:top-6 bg-white border border-[#a291b8] text-[#2c2c2c] font-black px-6 py-2.5 rounded-full shadow-md text-sm sm:text-base tracking-widest uppercase transition-all duration-300 transform scale-100 z-10 text-center";
            
            // 翻轉卡片至背面
            const cardInners = document.querySelectorAll('.card-inner');
            cardInners.forEach((inner) => {
                inner.classList.add('is-flipped');
            });
            playSound('flip');
            
            // 延時 1.2 秒後翻回正面，並在翻開時悄悄替換目標卡片圖案為 Side B
            setTimeout(() => {
                const targetWrapper = document.querySelector(`[data-index="${changedIndex}"]`);
                if (targetWrapper) {
                    const frontEl = targetWrapper.querySelector('.card-front');
                    const card = roundCards[changedIndex];
                    frontEl.innerHTML = `
                        <div class="w-full h-full flex items-center justify-center overflow-hidden pb-3.5">
                            ${getCardGraphic(card, 'B')}
                        </div>
                        <div class="absolute bottom-0.5 left-0 right-0 text-[9px] text-stone-400 font-bold tracking-wider select-none text-center bg-white/80 backdrop-blur-xs py-0.5 border-t border-stone-100/50">${card.name}</div>
                    `;
                }
                
                enterRevealPhase();
            }, 1200);
        }

        function enterRevealPhase() {
            gameState = 'REVEAL';
            const guessTime = parseFloat(settingGuessTime.value);
            
            const currentTeam = teams[currentTeamIndex];
            if (teams.length > 1) {
                phaseBanner.textContent = `【${currentTeam.name} 回合】找出哪一張卡片被修改了！`;
            } else {
                phaseBanner.textContent = `答題階段：找出哪一張卡片被修改了！`;
            }
            phaseBanner.className = "absolute top-4 sm:top-6 bg-white border border-[#8fa89b] text-[#2c2c2c] font-black px-6 py-2.5 rounded-full shadow-md text-sm sm:text-base tracking-widest uppercase transition-all duration-300 transform scale-100 z-10 text-center";
            
            // 翻轉卡片回正面
            const cardInners = document.querySelectorAll('.card-inner');
            cardInners.forEach((inner) => {
                inner.classList.remove('is-flipped');
            });
            playSound('flip');
            
            // 啟動答題計時
            maxTime = guessTime;
            timeLeft = guessTime;
            updateTimerBar();
            roundStartTime = Date.now();
            
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    clearInterval(timerInterval);
                    timeOutLose();
                } else {
                    // 低於 3 秒且開啟音效時播放 tick
                    if (timeLeft <= 3.0 && Math.round(timeLeft * 10) % 10 === 0) {
                        playSound('tick');
                    }
                }
                updateTimerBar();
            }, 100);
        }

        function resumeTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    clearInterval(timerInterval);
                    timeOutLose();
                } else {
                    if (timeLeft <= 3.0 && Math.round(timeLeft * 10) % 10 === 0) {
                        playSound('tick');
                    }
                }
                updateTimerBar();
            }, 100);
        }

        function startShortRecall() {
            clearInterval(timerInterval);
            gameState = 'SHORT_RECALL';
            
            // 1. 暫存原本答題階段剩餘時間
            savedRevealTime = timeLeft;
            
            // 2. 更新 Banner 提示 (櫻花粉色調邊框提示)
            phaseBanner.textContent = `提示時間：再看一眼原本的圖案！`;
            phaseBanner.className = "absolute top-4 sm:top-6 bg-white border border-[#ca7a72] text-[#2c2c2c] font-black px-6 py-2.5 rounded-full shadow-md text-sm sm:text-base tracking-widest uppercase transition-all duration-300 transform scale-100 z-10 text-center";
            
            // 3. 所有卡片正面重設為 Side A 圖案
            roundCards.forEach((card, idx) => {
                const wrapper = document.querySelector(`[data-index="${idx}"]`);
                if (wrapper) {
                    const frontEl = wrapper.querySelector('.card-front');
                    if (frontEl) {
                        frontEl.innerHTML = `
                            <div class="w-full h-full flex items-center justify-center overflow-hidden pb-3.5">
                                ${getCardGraphic(card, 'A')}
                            </div>
                            <div class="absolute bottom-0.5 left-0 right-0 text-[9px] text-stone-400 font-bold tracking-wider select-none text-center bg-white/80 backdrop-blur-xs py-0.5 border-t border-stone-100/50">${card.name}</div>
                        `;
                    }
                }
            });
            
            // 4. 所有卡片翻轉回正面
            const cardInners = document.querySelectorAll('.card-inner');
            cardInners.forEach((inner) => {
                inner.classList.remove('is-flipped');
            });
            playSound('flip');
            
            // 5. 提示倒數計時（持續 2.0 秒）
            maxTime = 2.0;
            timeLeft = 2.0;
            updateTimerBar();
            
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    clearInterval(timerInterval);
                    
                    // 6. 倒數結束，翻回背面並悄悄放回 Side B，隨後恢復 Reveal
                    enterShortRecallTransition();
                }
                updateTimerBar();
            }, 100);
        }

        function enterShortRecallTransition() {
            // 翻轉卡片至背面
            const cardInners = document.querySelectorAll('.card-inner');
            cardInners.forEach((inner) => {
                inner.classList.add('is-flipped');
            });
            playSound('flip');
            
            // 延時 0.8 秒後翻回正面，並在翻開時替換目標卡片圖案為 Side B，接著進入 REVEAL
            setTimeout(() => {
                const targetWrapper = document.querySelector(`[data-index="${changedIndex}"]`);
                if (targetWrapper) {
                    const frontEl = targetWrapper.querySelector('.card-front');
                    const card = roundCards[changedIndex];
                    if (frontEl) {
                        frontEl.innerHTML = `
                            <div class="w-full h-full flex items-center justify-center overflow-hidden pb-3.5">
                                ${getCardGraphic(card, 'B')}
                            </div>
                            <div class="absolute bottom-0.5 left-0 right-0 text-[9px] text-stone-400 font-bold tracking-wider select-none text-center bg-white/80 backdrop-blur-xs py-0.5 border-t border-stone-100/50">${card.name}</div>
                        `;
                    }
                }
                
                // 恢復為原本答題階段，並還原剩餘計時
                gameState = 'REVEAL';
                
                const currentTeam = teams[currentTeamIndex];
                if (teams.length > 1) {
                    phaseBanner.textContent = `【${currentTeam.name} 回合】找出哪一張卡片被修改了！`;
                } else {
                    phaseBanner.textContent = `答題階段：找出哪一張卡片被修改了！`;
                }
                phaseBanner.className = "absolute top-4 sm:top-6 bg-white border border-[#8fa89b] text-[#2c2c2c] font-black px-6 py-2.5 rounded-full shadow-md text-sm sm:text-base tracking-widest uppercase transition-all duration-300 transform scale-100 z-10 text-center";
                
                // 翻正卡牌
                const innerCards = document.querySelectorAll('.card-inner');
                innerCards.forEach((inner) => {
                    inner.classList.remove('is-flipped');
                });
                playSound('flip');
                
                // 恢復原計時器
                const guessTime = parseFloat(settingGuessTime.value);
                maxTime = guessTime;
                timeLeft = savedRevealTime;
                updateTimerBar();
                
                // 重新開啟 Reveal 計時器
                resumeTimer();
            }, 800);
        }

        function selectCard(idx) {
            if (gameState !== 'REVEAL') return;
            
            const clickedCard = document.querySelector(`[data-index="${idx}"]`);
            const currentTeam = teams[currentTeamIndex];
            
            if (idx === changedIndex) {
                // 答對邏輯
                clearInterval(timerInterval);
                gameState = 'FINISHED';
                playSound('correct');
                
                if (clickedCard) {
                    clickedCard.classList.add('flash-correct');
                }
                
                // 基礎分數計算
                const baseScore = 100;
                const timeBonus = Math.round(timeLeft * 10);
                
                // 1. 🎯 完美眼力：本次答題過程中未曾猜錯
                const isPerfect = guessedWrongIndices.length === 0;
                const perfectBonus = isPerfect ? 50 : 0;
                
                // 2. ⚡ 閃電反射：進入答題階段 2 秒內點對
                const elapsed = Date.now() - roundStartTime;
                const isLightning = elapsed <= 2000;
                const lightningBonus = isLightning ? 30 : 0;
                
                // 3. 🔥 連勝加成：連勝 3 次以上（答對後當前連勝將達到 3）翻倍
                const isStreakHot = currentTeam.streak >= 2;
                const streakMultiplier = isStreakHot ? 30 : 15;
                const streakBonus = currentTeam.streak * streakMultiplier;
                
                const roundScore = baseScore + timeBonus + perfectBonus + lightningBonus + streakBonus;
                
                currentTeam.score += roundScore;
                currentTeam.streak += 1;
                
                // 同步更新全域變數以供顯示
                score = currentTeam.score;
                
                updateTeamsDashboard();
                
                const breakdown = {
                    base: baseScore,
                    time: timeBonus,
                    perfect: perfectBonus,
                    lightning: lightningBonus,
                    streak: streakBonus,
                    streakCount: currentTeam.streak - 1,
                    isStreakHot: isStreakHot
                };
                
                // 延時 0.6 秒以利展現發光特效後彈出 Modal
                setTimeout(() => {
                    showResultModal('success', roundScore, breakdown);
                }, 600);
            } else {
                // 答錯邏輯：暫停時間，扣分，不立即公佈答案而是讓玩家再試一次
                clearInterval(timerInterval);
                playSound('incorrect');
                guessedWrongIndices.push(idx);
                
                if (clickedCard) {
                    clickedCard.classList.add('flash-incorrect', 'animate-shake', 'opacity-40');
                    setTimeout(() => {
                        clickedCard.classList.remove('flash-incorrect', 'animate-shake');
                    }, 600);
                }
                
                currentTeam.streak = 0;
                
                // 答錯扣分 (-20)，最低 0 分
                currentTeam.score = Math.max(0, currentTeam.score - 20);
                score = currentTeam.score;
                
                updateTeamsDashboard();
                
                // 判斷是否還有機會繼續猜 (猜錯次數 < 卡片總數 - 1)
                if (guessedWrongIndices.length >= roundCards.length - 1) {
                    gameState = 'FINISHED';
                    // 標示出正確答案
                    const correctCard = document.querySelector(`[data-index="${changedIndex}"]`);
                    if (correctCard) {
                        correctCard.classList.add('ring-4', 'ring-emerald-500', 'scale-105', 'z-20');
                    }
                    
                    // 其他卡片變暗
                    document.querySelectorAll('[data-index]').forEach((el, index) => {
                        if (index !== changedIndex) {
                            el.classList.add('opacity-25');
                        }
                    });
                    
                    setTimeout(() => {
                        showResultModal('fail', 0);
                    }, 1000);
                } else {
                    // 還能繼續猜，跳出「再試一次」提示視窗
                    setTimeout(() => {
                        showResultModal('try_again', 0);
                    }, 600);
                }
            }
        }

        function timeOutLose() {
            gameState = 'FINISHED';
            playSound('incorrect');
            
            const currentTeam = teams[currentTeamIndex];
            currentTeam.streak = 0;
            updateTeamsDashboard();
            
            // 標示出正確答案
            const correctCard = document.querySelector(`[data-index="${changedIndex}"]`);
            if (correctCard) {
                correctCard.classList.add('ring-4', 'ring-emerald-500', 'scale-105', 'z-20');
            }
            
            // 其他卡片變暗以利提示
            document.querySelectorAll('[data-index]').forEach((el, idx) => {
                if (idx !== changedIndex) {
                    el.classList.add('opacity-25');
                }
            });
            
            setTimeout(() => {
                showResultModal('fail', 0);
            }, 1000);
        }

        // --- 結果彈出視窗 (Modal) 控制 ---
        function showResultModal(status, roundScore, breakdown = null) {
            // 清空明細
            modalScoreDetails.innerHTML = '';
            
            if (status === 'success') {
                modalIcon.textContent = '🎉';
                modalTitle.textContent = '答對了！';
                modalTitle.className = "text-4xl sm:text-5xl font-black text-[#7a9a83] mb-2 tracking-widest";
                
                const descriptions = [
                    "你一眼就看出了其中的微妙變化！",
                    "神乎其技！記憶力與反射神經的極致展現！",
                    "完全逃不出你的法眼，視覺大師當之無愧！"
                ];
                modalDesc.textContent = descriptions[Math.floor(Math.random() * descriptions.length)];
                
                modalScoreBlock.classList.remove('hidden');
                modalScoreGet.textContent = `+${roundScore}`;
                modalScoreTotal.textContent = score;
                
                // 動態組裝得分明細 HTML
                if (breakdown) {
                    let detailsHTML = `
                        <div class="flex justify-between items-center opacity-85">
                            <span>🃏 基礎答對得分</span>
                            <span class="text-emerald-400 font-mono">+${breakdown.base}</span>
                        </div>
                        <div class="flex justify-between items-center opacity-85">
                            <span>⏱️ 剩餘時間加成</span>
                            <span class="text-emerald-400 font-mono">+${breakdown.time}</span>
                        </div>
                    `;
                    if (breakdown.perfect > 0) {
                        detailsHTML += `
                            <div class="flex justify-between items-center text-amber-400 font-bold">
                                <span>🎯 完美眼力獎勵</span>
                                <span class="font-mono">+${breakdown.perfect}</span>
                            </div>
                        `;
                    }
                    if (breakdown.lightning > 0) {
                        detailsHTML += `
                            <div class="flex justify-between items-center text-blue-400 font-bold">
                                <span>⚡ 閃電反射獎勵</span>
                                <span class="font-mono">+${breakdown.lightning}</span>
                            </div>
                        `;
                    }
                    if (breakdown.streak > 0) {
                        const hotText = breakdown.isStreakHot ? ' (🔥翻倍)' : '';
                        detailsHTML += `
                            <div class="flex justify-between items-center text-purple-400 font-bold">
                                <span>🔥 連勝加成${hotText}</span>
                                <span class="font-mono">+${breakdown.streak}</span>
                            </div>
                        `;
                    }
                    modalScoreDetails.innerHTML = detailsHTML;
                }
                
                modalBtnContainer.innerHTML = `
                    <button id="modal-btn-action" class="w-full bg-[#8fa89b] hover:bg-[#7e978a] text-white font-black py-3.5 rounded-xl shadow-sm active:scale-95 hover:scale-[1.02] transition-all text-base sm:text-lg tracking-widest uppercase">
                        下一關 ➡️
                    </button>
                `;
                
                document.getElementById('modal-btn-action').addEventListener('click', () => {
                    closeModal();
                    
                    // 判定是否滿足結束條件
                    const hasWinner = targetScore > 0 && teams.some(t => t.score >= targetScore);
                    const isRoundLimitReached = roundsPerTeam > 0 && currentRound >= teams.length * roundsPerTeam;
                    
                    if (hasWinner || isRoundLimitReached) {
                        showLeaderboard();
                    } else {
                        currentTeamIndex = (currentTeamIndex + 1) % teams.length;
                        startNextRound();
                    }
                });
            } else if (status === 'try_again') {
                modalIcon.textContent = '❌';
                modalTitle.textContent = '答錯囉！';
                modalTitle.className = "text-4xl sm:text-5xl font-black text-[#ca7a72] mb-2 tracking-widest";
                modalDesc.textContent = "這個圖案好像沒有變化，再仔計觀察看看吧！";
                
                modalScoreBlock.classList.remove('hidden');
                modalScoreGet.textContent = '-20';
                modalScoreTotal.textContent = score;
                
                modalScoreDetails.innerHTML = `
                    <div class="flex justify-between items-center text-[#ca7a72] font-bold">
                        <span>❌ 答錯扣分</span>
                        <span class="font-mono">-20</span>
                    </div>
                `;
                
                modalBtnContainer.innerHTML = `
                    <button id="modal-btn-hint" class="w-full bg-[#8fa89b] hover:bg-[#7e978a] text-white font-black py-3.5 rounded-xl shadow-sm active:scale-95 hover:scale-[1.02] transition-all text-base sm:text-lg tracking-widest uppercase">
                        👀 再看一眼 (2秒)
                    </button>
                    <button id="modal-btn-action" class="w-full bg-[#d8c3a5] hover:bg-[#cbb698] text-[#3c3c3c] font-black py-3.5 rounded-xl shadow-sm active:scale-95 hover:scale-[1.02] transition-all text-base sm:text-lg tracking-widest uppercase">
                        🔄 繼續盲猜
                    </button>
                `;
                
                document.getElementById('modal-btn-action').addEventListener('click', () => {
                    closeModal();
                    resumeTimer();
                });
                
                document.getElementById('modal-btn-hint').addEventListener('click', () => {
                    closeModal();
                    startShortRecall();
                });
            } else {
                modalIcon.textContent = '😢';
                modalTitle.textContent = '挑戰失敗！';
                modalTitle.className = "text-4xl sm:text-5xl font-black text-[#d98880] mb-2 tracking-widest";
                modalDesc.textContent = "很遺憾，時間結束或猜錯太多次了！綠色外框即為正確答案。";
                
                modalScoreBlock.classList.remove('hidden');
                modalScoreGet.textContent = '0';
                modalScoreTotal.textContent = score;
                
                modalScoreDetails.innerHTML = `
                    <div class="flex justify-between items-center text-slate-400 font-semibold italic">
                        <span>本次無任何得分</span>
                        <span class="font-mono">+0</span>
                    </div>
                `;
                
                if (teams.length > 1) {
                    modalBtnContainer.innerHTML = `
                        <button id="modal-btn-action" class="w-full bg-[#d98880] hover:bg-[#ca7a72] text-white font-black py-3.5 rounded-xl shadow-sm active:scale-95 hover:scale-[1.02] transition-all text-base sm:text-lg tracking-widest uppercase">
                            換下一隊 ➡️
                        </button>
                    `;
                    document.getElementById('modal-btn-action').addEventListener('click', () => {
                        closeModal();
                        
                        // 判定是否滿足結束條件
                        const hasWinner = targetScore > 0 && teams.some(t => t.score >= targetScore);
                        const isRoundLimitReached = roundsPerTeam > 0 && currentRound >= teams.length * roundsPerTeam;
                        
                        if (hasWinner || isRoundLimitReached) {
                            showLeaderboard();
                        } else {
                            currentTeamIndex = (currentTeamIndex + 1) % teams.length;
                            startNextRound();
                        }
                    });
                } else {
                    modalBtnContainer.innerHTML = `
                        <button id="modal-btn-action" class="w-full bg-[#d8c3a5] hover:bg-[#cbb698] text-[#3c3c3c] font-black py-3.5 rounded-xl shadow-sm active:scale-95 hover:scale-[1.02] transition-all text-base sm:text-lg tracking-widest uppercase">
                            🏠 返回大廳
                        </button>
                    `;
                    document.getElementById('modal-btn-action').addEventListener('click', () => {
                        closeModal();
                        showLobby();
                    });
                }
            }
            
            resultModal.classList.remove('hidden');
            resultModal.classList.remove('pointer-events-none');
            const modalContent = resultModal.querySelector('div');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }

        function showLeaderboard() {
            clearInterval(timerInterval);
            gameState = 'FINISHED';
            playSound('magic');
            
            // 排序名次
            const sortedTeams = [...teams].sort((a, b) => b.score - a.score);
            const winner = sortedTeams[0];
            
            modalIcon.textContent = '🏆';
            modalTitle.textContent = '競賽結果結算';
            modalTitle.className = "text-3xl sm:text-4xl font-black text-[#2c2c2c] mb-2 tracking-widest";
            
            // 產生名次列表 HTML
            let listHTML = `<div class="flex flex-col gap-3 my-4 max-h-[220px] overflow-y-auto px-1">`;
            sortedTeams.forEach((team, index) => {
                const rankMedal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}`;
                const rankBg = index === 0 ? 'bg-[#f5efe4] border-[#d8c3a5] text-[#8b7e6b]' : 'bg-stone-50 border-stone-200 text-[#3c3c3c]';
                const highlight = index === 0 ? 'font-black scale-102' : 'font-semibold';
                listHTML += `
                    <div class="flex justify-between items-center px-4 py-2.5 rounded-xl border ${rankBg} ${highlight} shadow-sm">
                        <div class="flex items-center gap-3">
                            <span class="text-lg">${rankMedal}</span>
                            <span>${team.name}</span>
                        </div>
                        <div class="flex items-center gap-4 font-mono">
                            <span class="text-[9px] text-stone-400">連勝 ${team.streak}</span>
                            <span class="text-lg text-[#7a9a83]">${String(team.score).padStart(4, '0')} 分</span>
                        </div>
                    </div>
                `;
            });
            listHTML += `</div>`;
            
            modalDesc.innerHTML = `恭喜 **${winner.name}** 榮獲本次競賽的總冠軍！<br>${listHTML}`;
            
            modalScoreBlock.classList.add('hidden'); // 隱藏原本單局的單一分數顯示
            
            modalBtnContainer.innerHTML = `
                <button id="modal-btn-action" class="w-full bg-[#8fa89b] hover:bg-[#7e978a] text-white font-black py-3.5 rounded-xl shadow-sm active:scale-95 hover:scale-[1.02] transition-all text-base tracking-widest uppercase">
                    🏠 返回大廳
                </button>
            `;
            
            document.getElementById('modal-btn-action').addEventListener('click', () => {
                closeModal();
                showLobby();
            });
            
            resultModal.classList.remove('hidden');
            resultModal.classList.remove('pointer-events-none');
            const modalContent = resultModal.querySelector('div');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }

        function closeModal() {
            resultModal.classList.add('hidden');
            resultModal.classList.add('pointer-events-none');
            const modalContent = resultModal.querySelector('div');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
        }

        function startNextRound() {
            currentRound += 1;
            roundDisplay.textContent = currentRound;
            startRound();
        }

        function updateTimerBar() {
            const percentage = (timeLeft / maxTime) * 100;
            timerBar.style.width = `${percentage}%`;
            timerText.textContent = `${Math.max(0, timeLeft).toFixed(1)} 秒`;
            
            // 當倒數低於 3 秒時，計時條轉為紅色並加上脈衝動畫
            if (timeLeft <= 3.0) {
                timerBar.className = "bg-gradient-to-r from-rose-500 to-red-600 h-full rounded-full transition-all duration-100 animate-pulse";
                timerText.className = "text-rose-500 font-mono font-bold text-sm tracking-widest animate-pulse";
            } else {
                timerBar.className = "bg-gradient-to-r from-emerald-400 via-amber-400 to-rose-500 h-full rounded-full transition-all duration-100";
                timerText.className = "text-amber-400 font-mono font-bold text-sm tracking-widest";
            }
        }

        // 初始化大廳與隊伍輸入框
        showLobby();
    </script>
</body>
</html>
